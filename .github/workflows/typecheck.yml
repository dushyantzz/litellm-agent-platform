name: Typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx prisma generate

      - run: npx tsc --noEmit

      # Guard: issue reporting instruction must stay present in message route.
      - name: Assert issue reporting prompt is present
        run: |
          FILE="src/app/api/v1/managed_agents/sessions/[session_id]/message/route.ts"
          grep -q "report_issue" "$FILE" || { echo "FAIL: report_issue not in message route"; exit 1; }
          grep -q "sandbox restarts" "$FILE"  || { echo "FAIL: sandbox restart case missing"; exit 1; }
          grep -q "agent_id" "$FILE" || { echo "FAIL: agent_id not in issue reporting block"; exit 1; }
          echo "✓ issue reporting prompt block present"

  typecheck-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The harness depends on the shared @lap/managed-tools package via a
      # `file:../../managed-tools` reference whose `exports` resolve to compiled
      # output (dist/). Build it first — same order as the harness Dockerfile —
      # so `npm run build` below can resolve `@lap/managed-tools/memory`.
      # Lockfiles for these packages are gitignored, so use `npm install`.
      - name: Build managed-tools
        working-directory: managed-tools
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npx tsc

      - name: Typecheck harness
        working-directory: harnesses/claude-agent-sdk
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          npm run build
