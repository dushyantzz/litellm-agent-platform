# Template: fill values before applying. Never commit with real values.
#
# Usage:
#   1. Copy this file to secrets.local.yaml (git-ignored).
#   2. Base64-encode each value:  echo -n 'my-value' | base64
#   3. Paste the encoded strings into the `data` block below.
#   4. kubectl apply -f secrets.local.yaml
#
# Or use a secrets manager (AWS Secrets Manager + external-secrets-operator,
# Vault, etc.) and replace this Secret with an ExternalSecret CR.
#
# Keys marked REQUIRED must be set before the pods will start.
# Keys marked OPTIONAL can be left as empty-string if not using that feature.

---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  namespace: default
type: Opaque
data:
  # REQUIRED — shared auth key for the platform API.
  # Generate with: openssl rand -hex 32 | tr -d '\n' | base64
  MASTER_KEY: ""

  # REQUIRED — PostgreSQL connection string.
  # e.g. postgresql://user:pass@host:5432/dbname?sslmode=require
  DATABASE_URL: ""

  # REQUIRED — API key for your LiteLLM proxy / OpenAI-compatible gateway.
  LITELLM_API_KEY: ""

  # OPTIONAL — base64-encoded kubeconfig for the sandbox cluster.
  # Not needed when IN_CLUSTER=true (pods authenticate via ServiceAccount).
  # Still set this if you run the platform outside Kubernetes (e.g. local dev).
  # Generate with: cat ~/.kube/config | base64 | tr -d '\n'
  KUBE_CONFIG_B64: ""

  # OPTIONAL — AWS credentials for EKS exec-plugin (aws-iam-authenticator).
  # Required only when the kubeconfig uses aws eks get-token / exec auth.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # REQUIRED for TUI harnesses (claude-code, codex) — shared secret that
  # authenticates browser → proxy → harness WebSocket connections.
  # The platform injects this into sandbox pods as HARNESS_AUTH_TOKEN (via
  # CONTAINER_ENV_ passthrough) and returns it to browsers as tty_token.
  # Generate with: openssl rand -hex 16
  CONTAINER_ENV_HARNESS_AUTH_TOKEN: ""
