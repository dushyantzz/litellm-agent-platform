services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-agents-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_agents"]
      interval: 2s
      timeout: 2s
      retries: 30

  # One-shot: push the Prisma schema to Postgres before web/worker start.
  db-migrate:
    build:
      context: .
      target: prisma
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      # Buildkit defaults to the last stage of a multi-stage Dockerfile.
      # The Dockerfile's last stage is `worker`, so without an explicit
      # target the web container ends up running the reconciler. Pin to
      # `runner` (the Next.js standalone server stage).
      target: runner
    ports:
      - "3002:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
